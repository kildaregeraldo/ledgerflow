# ── Datasource ──────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/ledgerflow
spring.datasource.username=postgres
spring.datasource.password=postgres

# ── JPA / Hibernate ─────────────────────────────────────────
# update: cria/atualiza tabelas automaticamente baseado nas entidades
# nunca usar "create" em produção (apaga tudo a cada restart)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
# ── Swagger ─────────────────────────────────────────────────
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs

# ── Aplicação ───────────────────────────────────────────────
spring.application.name=ledgerflow
server.port=8080